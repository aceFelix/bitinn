spring:
  application:
    name: bitinn
  profiles:
    active: local
  data:
    redis:
      host: ${redis.host}
      port: ${redis.port}
      password: ${redis.password}
    mongodb:
      uri: ${mongodb.uri:mongodb://localhost:27017/bitinn}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${datasource.host}:${datasource.port}/${datasource.database}${datasource.path}
    username: ${datasource.username}
    password: ${datasource.password}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 10000
      connection-test-query: SELECT 1
  mail:
    host: ${mail.host}
    port: ${mail.port}
    username: ${mail.username}
    password: ${mail.password}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
          ssl:
            enable: true
  messages:
    encoding: UTF-8
  ai:
    vectorstore:
      redis:
        initialize-schema: true
        index-name: bitinn-article-index
        prefix: "article:vec:"
    dashscope:
      embedding:
        options:
          model: "qwen3-vl-embedding"
        enabled: true
      chat:
        options:
          multi-model: true

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

mybatis:
  mapper-locations: classpath:com/itniuma/bitinn/mapper/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: true

website:
  domain: ${website.domain}

dromara:
  x-file-storage:
    default-platform: aliyun-oss-1
    thumbnail-suffix: ".min.jpg"
    aliyun-oss:
      - platform: aliyun-oss-1
        enable-storage: true
        access-key: ${aliyun-oss.access-key}
        secret-key: ${aliyun-oss.secret-key}
        end-point: ${aliyun-oss.end-point}
        bucket-name: ${aliyun-oss.bucket-name}
        domain: ${aliyun-oss.domain}
        base-path: ${aliyun-oss.base-path}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
